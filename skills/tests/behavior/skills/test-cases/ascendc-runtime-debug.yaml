# =============================================================================
# Skill Test Configuration
# =============================================================================
# This file defines custom test cases for ascendc-runtime-debug skill.
# If this file exists, custom tests will be used instead of auto-generated ones.
#
# Configuration Structure:
#   - trigger: Test prompts for B-TRIG-01/02
#   - interaction: Test prompts for B-INTA-01/02
#   - expected: Expected response patterns
# =============================================================================

skill: ascendc-runtime-debug

# -----------------------------------------------------------------------------
# B-TRIG-01: Precise Trigger Test
# Prompts using core keywords from skill description
# -----------------------------------------------------------------------------
trigger:
  precise:
    - prompt: "我的算子运行时报错，错误码 161001"
      expected_keywords: ["错误码", "161", "运行时", "调试", "aclnn"]
    - prompt: "aclnn 调用返回错误怎么排查"
      expected_keywords: ["aclnn", "错误", "排查", "调试"]
    - prompt: "算子执行返回561003错误码怎么解决"
      expected_keywords: ["561003", "Kernel", "查找", "错误码"]

# -----------------------------------------------------------------------------
# B-TRIG-02: Fuzzy Trigger Test
# Prompts using colloquial or non-standard terms
# -----------------------------------------------------------------------------
  fuzzy:
    - prompt: "代码跑不通，报错了"
      expected_keywords: ["错误", "排查", "调试", "报错"]
    - prompt: "算子执行出问题了"
      expected_keywords: ["问题", "排查", "调试", "定位"]

# -----------------------------------------------------------------------------
# B-INTA-01: Missing Parameter Clarification
# Prompts with missing critical information
# -----------------------------------------------------------------------------
interaction:
  missing_params:
    - prompt: "算子报错了"
      should_ask_about: ["错误码", "算子名称", "调用方式"]
    - prompt: "运行报错怎么办"
      should_ask_about: ["错误信息", "场景", "代码"]

# -----------------------------------------------------------------------------
# B-INTA-02: Context Retention
# Multi-turn conversation context
# -----------------------------------------------------------------------------
  context:
    - prompt: "我正在调试 Ascend910B 上的算子，报错 161001。这是 aclnn 调用错误，应该如何定位？"
      should_reference: ["Ascend910B", "161001", "aclnn"]
    - prompt: "之前说的那个错误，我已经找到了是参数问题，现在怎么修复？"
      should_reference: ["参数", "错误", "修复"]

# -----------------------------------------------------------------------------
# Custom Test Cases (Optional)
# Additional skill-specific tests
# -----------------------------------------------------------------------------
custom:
  - name: "error_code_recognition"
    prompt: "错误码 161001 是什么含义？"
    expected_keywords: ["参数", "无效", "aclnn"]
  - name: "debug_workflow"
    prompt: "算子运行时调试的完整流程是什么？"
    expected_keywords: ["plog", "定位", "分析", "日志"]
